<body>

<!-- Embedded YouTube video container -->
<div id="video-container">
  <!-- Newest video will be loaded here -->
</div>

<!-- Script to fetch the newest video ID and embed it -->
<script>
  // Fetch the newest video using the YouTube Data API
  const apiKey = 'AIzaSyBdCE0jekKt3Tch55cBar-wEf5UmTOKn9M'; // Replace with your YouTube Data API key
  const channelId = 'UCx7tzeg2_Apssr5Hsh3naUw'; // Replace with your YouTube channel ID

  fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&order=date&type=video&key=${apiKey}`)
    .then(response => response.json())
    .then(data => {
      const videoId = data.items[0].id.videoId;
      const videoContainer = document.getElementById('video-container');
      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/embed/${videoId}`;
      iframe.width = '100%';
      iframe.height = '100%';
      iframe.frameBorder = '0';
      videoContainer.appendChild(iframe);
    })
    .catch(error => {
      console.error('Error fetching data:', error);
    });
</script>

</body>
